spring.application.name=aether

# PostgreSQL Configuration
# Uses env vars in production (Railway auto-provides these), falls back to local defaults
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/aether_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:#lorenzo_333}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}

# Firebase Authentication
firebase.enabled=${FIREBASE_ENABLED:true}
