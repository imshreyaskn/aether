spring.application.name=aether

# PostgreSQL Configuration
# Railway provides PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD individually.
# Locally, falls back to your local Postgres.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:aether_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:#lorenzo_333}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server — Railway injects PORT automatically
server.port=${PORT:8080}

# Firebase Authentication
firebase.enabled=${FIREBASE_ENABLED:true}
